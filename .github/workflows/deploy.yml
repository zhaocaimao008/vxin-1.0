name: 自动部署 V信后端

on:
  push:
    branches:
      - main
    paths:
      - 'backend-v2/**'
      - 'web/src/**'
      - 'web/public/**'
      - 'web/index.html'
      - 'web/vite.config.js'
      - 'web/package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read

jobs:
  test:
    name: 冒烟检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'   # 依赖要求 node >=20（aws-sdk 等），原 18 过低
          cache: 'npm'
          cache-dependency-path: backend-v2/package-lock.json

      - name: 安装依赖
        working-directory: backend-v2
        run: npm ci

      # 全套 npm test 依赖预置种子数据的 wechat.db，CI 空库跑不过；
      # 改为「冒烟加载」：用临时库把整个 app（含 schema 迁移 + 所有模块 require）加载一遍，
      # 能抓出语法/依赖/schema 等会导致线上崩溃的错误，作为部署闸门稳定可靠。
      - name: 冒烟加载 app
        working-directory: backend-v2
        run: node -e "require('./src/app'); console.log('✅ app 加载成功'); process.exit(0)"
        env:
          NODE_ENV: test
          # 必须 ≥32 字符，否则 config/index.js 的安全校验会 process.exit(1)，
          # 令冒烟检查失败、部署闸门永远关闭（此前每次 push 部署都被此卡死）。
          JWT_SECRET: ci-smoke-jwt-secret-0123456789abcdef
          DB_PATH: /tmp/vxin-ci-smoke.db

  # ── 部署闸门（除冒烟外，追加真实门禁，任一红则不部署）──
  backend-jest:
    name: 后端 Jest + 覆盖率下限
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend-v2/package-lock.json
      - name: 安装依赖
        working-directory: backend-v2
        run: npm ci
      - name: Jest 全套 + 覆盖率门禁（隔离测试库，不碰 wechat.db）
        working-directory: backend-v2
        env:
          REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:coverage

  web-gate:
    name: Web Lint + Capacitor 版本守护
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: 安装 web 依赖
        working-directory: web
        run: npm ci --legacy-peer-deps
      - name: Capacitor 版本一致性
        working-directory: web
        run: npm run check:capacitor
      - name: ESLint（0 warning）
        working-directory: web
        run: npm run lint -- --max-warnings=0

  deploy:
    name: 部署到香港服务器
    needs: [test, backend-jest, web-gate]   # 冒烟 + 后端测试/覆盖率 + web门禁 全绿才部署
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 部署应用
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_PATH: /root/v信/backend-v2
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ⚠ 用单引号 heredoc 保持脚本字面量；把变量通过远端 bash -s 的命令行 env 传进去
          #   （原脚本把 env 设在 runner 上，heredoc 里 $DEPLOY_PATH 在服务器端是空的 → cd 到家目录 → git 找不到仓库）
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} \
            "DEPLOY_PATH='${DEPLOY_PATH}' GH_TOKEN='${GH_TOKEN}' bash -s" << 'DEPLOY_SCRIPT'
          set -e
          REPO_ROOT="$(dirname "$DEPLOY_PATH")"   # git 仓库根 = backend-v2 的上一级（/root/v信）
          AUTH_URL="https://x-access-token:${GH_TOKEN}@github.com/zhaocaimao008/vxin-1.0.git"
          CLEAN_URL="https://github.com/zhaocaimao008/vxin-1.0.git"

          echo "📋 V信后端自动部署 $(date)"
          echo "仓库根: $REPO_ROOT | 应用目录: $DEPLOY_PATH"

          # 首次部署：仓库根没有 .git 时，bootstrap 把 git 历史引导进现有目录
          if [ ! -d "$REPO_ROOT/.git" ]; then
            echo "🆕 首次部署：克隆 git 历史到 $REPO_ROOT"
            TMP="$(mktemp -d)"
            git clone --no-checkout "$AUTH_URL" "$TMP/repo"
            mv "$TMP/repo/.git" "$REPO_ROOT/.git"
            rm -rf "$TMP"
            git -C "$REPO_ROOT" remote set-url origin "$CLEAN_URL"
          fi

          echo "📥 步骤 1: 拉取最新代码 (main)"
          # 记录部署前的 commit，供健康检查失败时自动回滚（生产自愈，避免坏版本长期在线）
          PREV_SHA="$(git -C "$REPO_ROOT" rev-parse HEAD 2>/dev/null || echo '')"
          echo "部署前版本: ${PREV_SHA:-<无（首次部署）>}"
          # 用带 token 的 URL 显式 fetch（token 不落盘到 remote 配置）
          git -C "$REPO_ROOT" fetch "$AUTH_URL" main
          git -C "$REPO_ROOT" reset --hard FETCH_HEAD

          echo "🌐 步骤 2a: 构建 Web 前端"
          cd "$REPO_ROOT/web"
          npm ci
          npm run build
          echo "✅ Web 构建完成（dist/ 已更新）"

          echo "📦 步骤 2b: 安装后端生产依赖"
          cd "$DEPLOY_PATH"
          npm ci --omit=dev
          chmod 600 .env 2>/dev/null || true

          echo "🚀 步骤 3: 重启应用（pm2: vxin-server-v2）"
          pm2 restart vxin-server-v2 --update-env || PORT=3002 pm2 start src/server.js --name vxin-server-v2
          pm2 save || true

          echo "✅ 步骤 4: 健康检查"
          sleep 5
          HEALTH_OK=0
          for i in $(seq 1 15); do
            if curl -s http://localhost:3002/health | grep -q "ok"; then
              echo "✅ 健康检查通过"; HEALTH_OK=1; break
            fi
            echo "等待启动... ($i/15)"; sleep 2
          done

          # ── 自动回滚：新版本起不来时，回到部署前的 commit 并重启，避免生产长期挂掉 ──
          if [ "$HEALTH_OK" != "1" ]; then
            echo "❌ 新版本健康检查失败"
            if [ -n "$PREV_SHA" ]; then
              echo "↩️  自动回滚到部署前版本 $PREV_SHA"
              git -C "$REPO_ROOT" reset --hard "$PREV_SHA"
              cd "$REPO_ROOT/web" && npm ci && npm run build || echo "⚠ 回滚 web 构建失败（前端可能保留新版 dist）"
              cd "$DEPLOY_PATH" && npm ci --omit=dev
              pm2 restart vxin-server-v2 --update-env || PORT=3002 pm2 start src/server.js --name vxin-server-v2
              pm2 save || true
              sleep 5
              RB_OK=0
              for i in $(seq 1 15); do
                if curl -s http://localhost:3002/health | grep -q "ok"; then
                  echo "✅ 回滚后健康检查通过（生产已恢复到 $PREV_SHA）"; RB_OK=1; break
                fi
                echo "回滚后等待启动... ($i/15)"; sleep 2
              done
              [ "$RB_OK" = "1" ] || echo "🚨 回滚后仍不健康！需人工介入：pm2 logs vxin-server-v2 --lines 80"
            else
              echo "🚨 无部署前版本（首次部署）可回滚，需人工介入"
            fi
            exit 1   # 无论是否回滚成功，本次部署都判失败（触发失败通知）
          fi
          echo "🎉 部署完成 $(date)"

          DEPLOY_SCRIPT

      - name: 部署完成通知
        if: success()
        run: |
          echo "✅ 部署成功！"
          echo "时间: $(date)"
          echo "版本: $(git rev-parse --short HEAD)"

      - name: 部署失败通知
        if: failure()
        run: |
          echo "❌ 部署失败！"
          echo "请检查服务器日志: pm2 logs vxin-server-v2 --lines 50"
          exit 1
