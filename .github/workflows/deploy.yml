name: 自动部署 V信后端

on:
  push:
    branches:
      - main
    paths:
      - 'backend-v2/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read

jobs:
  test:
    name: 冒烟检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'   # 依赖要求 node >=20（aws-sdk 等），原 18 过低
          cache: 'npm'
          cache-dependency-path: backend-v2/package-lock.json

      - name: 安装依赖
        working-directory: backend-v2
        run: npm ci

      # 全套 npm test 依赖预置种子数据的 wechat.db，CI 空库跑不过；
      # 改为「冒烟加载」：用临时库把整个 app（含 schema 迁移 + 所有模块 require）加载一遍，
      # 能抓出语法/依赖/schema 等会导致线上崩溃的错误，作为部署闸门稳定可靠。
      - name: 冒烟加载 app
        working-directory: backend-v2
        run: node -e "require('./src/app'); console.log('✅ app 加载成功'); process.exit(0)"
        env:
          NODE_ENV: test
          JWT_SECRET: ci-smoke-secret
          DB_PATH: /tmp/vxin-ci-smoke.db

  deploy:
    name: 部署到香港服务器
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 部署应用
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_PATH: /root/v信/backend-v2
        run: |
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} << 'DEPLOY_SCRIPT'
          set -e

          echo "📋 V信后端自动部署开始"
          echo "时间: $(date)"
          echo "================================"

          # 进入应用目录
          cd $DEPLOY_PATH || exit 1

          echo "📥 步骤 1: 获取最新代码"
          git fetch origin
          git checkout main
          git reset --hard origin/main

          echo "📦 步骤 2: 安装依赖（仅生产依赖；保留 lock 文件，git reset 已恢复）"
          npm ci --omit=dev

          echo "🚀 步骤 3: 重启应用（pm2 托管：vxin-server-v2）"
          pm2 restart vxin-server-v2 --update-env || PORT=3002 pm2 start src/server.js --name vxin-server-v2
          pm2 save || true

          echo "✅ 步骤 4: 验证部署"
          sleep 5
          for i in {1..15}; do
            if curl -s http://localhost:3002/health | grep -q "ok"; then
              echo "✅ 应用健康检查通过！"
              break
            fi
            echo "等待应用启动... ($i/15)"
            sleep 1
          done

          echo "================================"
          echo "🎉 部署成功！"
          echo "时间: $(date)"

          DEPLOY_SCRIPT

      - name: 部署完成通知
        if: success()
        run: |
          echo "✅ 部署成功！"
          echo "时间: $(date)"
          echo "版本: $(git rev-parse --short HEAD)"

      - name: 部署失败通知
        if: failure()
        run: |
          echo "❌ 部署失败！"
          echo "请检查服务器日志: pm2 logs vxin-server-v2 --lines 50"
          exit 1
