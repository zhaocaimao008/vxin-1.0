name: 自动部署 V信后端

on:
  push:
    branches:
      - main
    paths:
      - 'backend-v2/**'
      - 'web/src/**'
      - 'web/public/**'
      - 'web/index.html'
      - 'web/vite.config.js'
      - 'web/package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read

jobs:
  test:
    name: 冒烟检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'   # 依赖要求 node >=20（aws-sdk 等），原 18 过低
          cache: 'npm'
          cache-dependency-path: backend-v2/package-lock.json

      - name: 安装依赖
        working-directory: backend-v2
        run: npm ci

      # 全套 npm test 依赖预置种子数据的 wechat.db，CI 空库跑不过；
      # 改为「冒烟加载」：用临时库把整个 app（含 schema 迁移 + 所有模块 require）加载一遍，
      # 能抓出语法/依赖/schema 等会导致线上崩溃的错误，作为部署闸门稳定可靠。
      - name: 冒烟加载 app
        working-directory: backend-v2
        run: node -e "require('./src/app'); console.log('✅ app 加载成功'); process.exit(0)"
        env:
          NODE_ENV: test
          JWT_SECRET: ci-smoke-secret
          DB_PATH: /tmp/vxin-ci-smoke.db

  deploy:
    name: 部署到香港服务器
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 部署应用
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_PATH: /root/v信/backend-v2
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ⚠ 用单引号 heredoc 保持脚本字面量；把变量通过远端 bash -s 的命令行 env 传进去
          #   （原脚本把 env 设在 runner 上，heredoc 里 $DEPLOY_PATH 在服务器端是空的 → cd 到家目录 → git 找不到仓库）
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} \
            "DEPLOY_PATH='${DEPLOY_PATH}' GH_TOKEN='${GH_TOKEN}' bash -s" << 'DEPLOY_SCRIPT'
          set -e
          REPO_ROOT="$(dirname "$DEPLOY_PATH")"   # git 仓库根 = backend-v2 的上一级（/root/v信）
          AUTH_URL="https://x-access-token:${GH_TOKEN}@github.com/zhaocaimao008/vxin-1.0.git"
          CLEAN_URL="https://github.com/zhaocaimao008/vxin-1.0.git"

          echo "📋 V信后端自动部署 $(date)"
          echo "仓库根: $REPO_ROOT | 应用目录: $DEPLOY_PATH"

          # 首次部署：仓库根没有 .git 时，bootstrap 把 git 历史引导进现有目录
          if [ ! -d "$REPO_ROOT/.git" ]; then
            echo "🆕 首次部署：克隆 git 历史到 $REPO_ROOT"
            TMP="$(mktemp -d)"
            git clone --no-checkout "$AUTH_URL" "$TMP/repo"
            mv "$TMP/repo/.git" "$REPO_ROOT/.git"
            rm -rf "$TMP"
            git -C "$REPO_ROOT" remote set-url origin "$CLEAN_URL"
          fi

          echo "📥 步骤 1: 拉取最新代码 (main)"
          # 用带 token 的 URL 显式 fetch（token 不落盘到 remote 配置）
          git -C "$REPO_ROOT" fetch "$AUTH_URL" main
          git -C "$REPO_ROOT" reset --hard FETCH_HEAD

          echo "🌐 步骤 2a: 构建 Web 前端"
          cd "$REPO_ROOT/web"
          npm ci
          npm run build
          echo "✅ Web 构建完成（dist/ 已更新）"

          echo "📦 步骤 2b: 安装后端生产依赖"
          cd "$DEPLOY_PATH"
          npm ci --omit=dev
          chmod 600 .env 2>/dev/null || true

          echo "🚀 步骤 3: 重启应用（pm2: vxin-server-v2）"
          pm2 restart vxin-server-v2 --update-env || PORT=3002 pm2 start src/server.js --name vxin-server-v2
          pm2 save || true

          echo "✅ 步骤 4: 健康检查"
          sleep 5
          HEALTH_OK=0
          for i in $(seq 1 15); do
            if curl -s http://localhost:3002/health | grep -q "ok"; then
              echo "✅ 健康检查通过"; HEALTH_OK=1; break
            fi
            echo "等待启动... ($i/15)"; sleep 2
          done
          if [ "$HEALTH_OK" != "1" ]; then echo "❌ 健康检查超时，服务未正常启动"; exit 1; fi
          echo "🎉 部署完成 $(date)"

          DEPLOY_SCRIPT

      - name: 部署完成通知
        if: success()
        run: |
          echo "✅ 部署成功！"
          echo "时间: $(date)"
          echo "版本: $(git rev-parse --short HEAD)"

      - name: 部署失败通知
        if: failure()
        run: |
          echo "❌ 部署失败！"
          echo "请检查服务器日志: pm2 logs vxin-server-v2 --lines 50"
          exit 1
