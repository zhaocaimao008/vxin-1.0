name: Windows Desktop Build

# 在云端 Windows runner 上用 electron-builder 打 Windows 安装包（NSIS .exe）。
# 无需本地/服务器装 wine。用法：Actions →「Windows Desktop Build」→ Run workflow，
# 跑完在底部 Artifacts 下载 vxin-windows-setup。
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Install desktop deps
        working-directory: desktop-electron
        run: npm ci

      - name: Build Windows installer
        working-directory: desktop-electron
        run: npm run build:win

      - name: Upload installer + update feed
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vxin-windows-setup
          # latest.yml / *.blockmap 是 electron-updater 自动更新所必需：必须与 .exe
          # 一并上传到更新源 https://dipsin.com/downloads/updates，否则客户端拉不到更新。
          path: |
            desktop-electron/dist/*.exe
            desktop-electron/dist/latest.yml
            desktop-electron/dist/*.blockmap
            desktop-electron/release/*.exe
            desktop-electron/release/latest.yml
            desktop-electron/release/*.blockmap
          if-no-files-found: warn

      - name: 部署 EXE 到香港服务器
        if: success()
        shell: bash
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          EXE=$(find desktop-electron/dist desktop-electron/release -name "*.exe" 2>/dev/null | head -1)
          echo "部署: $EXE → /var/www/downloads/vxin-windows-latest-setup.exe"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p /var/www/downloads/updates"
          scp -i ~/.ssh/deploy_key "$EXE" "${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/downloads/vxin-windows-latest-setup.exe"
          # 自动更新 feed（latest.yml + blockmap），客户端拉更新用
          for f in desktop-electron/dist/latest.yml desktop-electron/dist/*.blockmap; do
            [ -f "$f" ] && scp -i ~/.ssh/deploy_key "$f" "${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/downloads/updates/" || true
          done
          echo "✅ Windows 安装包已发布到 https://dipsin.com/downloads/vxin-windows-latest-setup.exe"
