name: Windows Desktop Build

# 在云端 Windows runner 上用 electron-builder 打 Windows 安装包（NSIS .exe）。
# 无需本地/服务器装 wine。用法：Actions →「Windows Desktop Build」→ Run workflow，
# 跑完在底部 Artifacts 下载 vxin-windows-setup。
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Install desktop deps
        working-directory: desktop-electron
        run: npm ci

      - name: Build Windows installer
        working-directory: desktop-electron
        run: npm run build:win

      - name: Upload installer + update feed
        uses: actions/upload-artifact@v4
        with:
          name: vxin-windows-setup
          # latest.yml / *.blockmap 是 electron-updater 自动更新所必需：必须与 .exe
          # 一并上传到更新源 https://dipsin.com/downloads/updates，否则客户端拉不到更新。
          path: |
            desktop-electron/dist/*.exe
            desktop-electron/dist/latest.yml
            desktop-electron/dist/*.blockmap
            desktop-electron/release/*.exe
            desktop-electron/release/latest.yml
            desktop-electron/release/*.blockmap
          if-no-files-found: warn

  deploy:
    name: 部署到香港服务器
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: vxin-windows-setup
          path: artifacts

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: SCP 到服务器
        run: |
          EXE=$(find artifacts -name "*.exe" | head -1)
          echo "部署: $EXE"
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER_HOST }}" \
            "mkdir -p /var/www/downloads/updates"
          scp -i ~/.ssh/deploy_key "$EXE" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER_HOST }}:/var/www/downloads/vxin-windows-latest-setup.exe"
          # 关键：把带版本名的 exe 也放进 updates/，electron-updater 读 latest.yml 后按原名去 updates/ 取，
          # 否则自动更新会 404（此前 updates/ 只有旧版 exe）。
          scp -i ~/.ssh/deploy_key "$EXE" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER_HOST }}:/var/www/downloads/updates/$(basename "$EXE")"
          # latest.yml/*.blockmap 可能在 artifacts/dist 或 artifacts/release 子目录 → 用 find 定位，
          # 否则自动更新源不会更新（旧脚本只找顶层，导致 latest.yml 停在旧版）。
          for f in $(find artifacts -name latest.yml -o -name '*.blockmap'); do
            scp -i ~/.ssh/deploy_key "$f" \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER_HOST }}:/var/www/downloads/updates/" || true
          done
          echo "✅ 已发布到 https://dipsin.com/downloads/vxin-windows-latest-setup.exe"
