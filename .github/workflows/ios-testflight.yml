name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.1)'
        required: false
        default: '1.0.0'
      submit_review:
        description: '上传后自动填测试信息并提交外部 Beta 审核'
        type: boolean
        required: false
        default: true
  push:
    tags:
      # iOS 端专属前缀触发（见 VERSIONING.md 第 2 节）；避免裸 v*/其他端 tag 误触发。
      # 版本号取自 tag（去掉 ios-v 前缀），且 tag 发布默认自动送外部 Beta 审核。
      - 'ios-v*'

jobs:
  testflight:
    # Apple 自 2026-04 起要求用 iOS 26 SDK(Xcode 26)构建才能上传 App Store。
    # macos-15 仅带 Xcode 16(iOS 18 SDK)，会在上传校验时 409。改用 macos-26。
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 解析版本与发布参数（tag 或手动触发通用）
        run: |
          # tag 触发：版本号取自 tag（ios-v1.0.11 → 1.0.11），并默认送外部 Beta 审核；
          # 手动触发：版本号取 inputs.version（默认 1.0.0），是否送审取 inputs.submit_review。
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#ios-v}"
            SUBMIT="true"
          else
            VERSION="${{ github.event.inputs.version }}"
            [ -z "$VERSION" ] && VERSION="1.0.0"
            SUBMIT="${{ github.event.inputs.submit_review }}"
            [ -z "$SUBMIT" ] && SUBMIT="true"
          fi
          echo "VERSION=$VERSION"     >> "$GITHUB_ENV"
          echo "SUBMIT_REVIEW=$SUBMIT" >> "$GITHUB_ENV"
          echo "解析结果 → 版本: $VERSION | 送审: $SUBMIT | 触发: ${GITHUB_REF_TYPE}/${GITHUB_REF_NAME}"

      - name: 选择 Xcode 26（满足 App Store iOS 26 SDK 要求）
        run: |
          echo "可用 Xcode:"; ls -d /Applications/Xcode*.app
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "选用: $XC"
          sudo xcode-select -s "$XC/Contents/Developer"

      - name: Xcode 版本
        run: xcodebuild -version

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 生成 Xcode 工程
        working-directory: ios
        run: xcodegen generate

      - name: 导入发布证书
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # 创建临时 keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain

          # 导入证书
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # 安装 Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/vxin.mobileprovision

      - name: Resolve Swift packages
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Vxin.xcodeproj \
            -scheme Vxin

      - name: 计算 build 号（Unix 时间戳，保证唯一且单调递增）
        id: buildno
        run: |
          # 用构建时刻的 Unix 时间戳作为 CFBundleVersion(build 号)：
          # 天然递增、绝不撞号，无需查 ASC 或依赖 git。远大于历史 build 11。
          BN=$(date -u +%s)
          echo "BUILD_NUMBER=$BN" >> "$GITHUB_ENV"
          echo "build_number=$BN" >> "$GITHUB_OUTPUT"
          echo "本次 build 号: $BN"

      - name: 构建并归档
        working-directory: ios
        env:
          APP_VERSION: ${{ env.VERSION }}
        run: |
          set -o pipefail
          # 签名配置已内置到 project.yml 的 Vxin target（仅 App 主 target），
          # 命令行不再传 CODE_SIGN_*/PROVISIONING_PROFILE_SPECIFIER，否则会被
          # 全局套用到 SPM 依赖(Firebase/Kingfisher)导致
          # "does not support provisioning profiles" 而归档失败。
          # CURRENT_PROJECT_VERSION 用上一步的时间戳 build 号，自动递增。
          xcodebuild archive \
            -project Vxin.xcodeproj \
            -scheme Vxin \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/Vxin.xcarchive \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: 导出 IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>F2J52VX786</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.vxin.app</key>
              <string>vxin_distribution</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/Vxin.xcarchive \
            -exportPath /tmp/vxin-ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

          ls -lh /tmp/vxin-ipa/

      - name: 上传到 TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          # 写入 API Key 文件
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          IPA=$(ls /tmp/vxin-ipa/*.ipa | head -1)
          echo "上传: $IPA"

          # 校验后上传到 App Store Connect / TestFlight。
          # altool 会自动从 ~/.appstoreconnect/private_keys 读取 AuthKey_<KEY_ID>.p8。
          # 注：notarytool 仅用于 macOS 公证，不能上传 iOS 到 TestFlight。
          xcrun altool --validate-app \
            -f "$IPA" \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

          xcrun altool --upload-app \
            -f "$IPA" \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: 保存 IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vxin-ios-ipa
          path: /tmp/vxin-ipa/*.ipa
          if-no-files-found: ignore

      # ── 自动填测试信息 + 提交外部 Beta 审核 ─────────────────────────────
      # 上传后构建需几分钟处理成 VALID 才能送审，脚本内含轮询等待。
      # 非敏感的测试信息/联系人/演示账号集中在 ios/testflight-config.json，
      # 可随时改；改完下次发版自动带上。
      - name: 安装 Python 依赖(送审脚本)
        if: ${{ env.SUBMIT_REVIEW == 'true' }}
        run: pip3 install --quiet --break-system-packages pyjwt cryptography requests || pip3 install --quiet pyjwt cryptography requests

      - name: 等待构建处理完成并提交 Beta 审核
        if: ${{ env.SUBMIT_REVIEW == 'true' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          set -e
          # 还原 ASC API Key 文件供脚本使用
          echo "$ASC_API_KEY_BASE64" | base64 --decode > /tmp/asc_key.p8
          export ASC_P8_PATH=/tmp/asc_key.p8
          # 从 config 载入测试信息（脚本读 JSON 并输出 export TF_*，供 eval）
          eval "$(python3 scripts/tf-config-to-env.py)"
          # 轮询等待最新构建变 VALID（最多 ~18 分钟）
          python3 scripts/ios-testflight-submit.py
