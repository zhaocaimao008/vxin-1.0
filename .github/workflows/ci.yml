name: CI Gate

# 上线门禁：每次 push/PR 都跑，全绿才允许合并/部署。
#   1) web ESLint（0 warning 策略）
#   2) Capacitor 版本一致性守护（防 CLI/平台主版本漂移致 Android 打包崩）
#   3) web vitest 单测（含离线消息缓存 msgCache 语义基线，与 Android/iOS 三端对齐）
#   4) backend-v2 Jest 全套 + 覆盖率下限（隔离测试库，不碰生产 wechat.db）
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-lint:
    name: Web Lint + Capacitor 版本守护
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: 安装 web 依赖
        working-directory: web
        run: npm ci --legacy-peer-deps
      - name: Capacitor 版本一致性
        working-directory: web
        run: npm run check:capacitor
      - name: ESLint
        working-directory: web
        run: npm run lint -- --max-warnings=0

  web-unit:
    name: Web Vitest 单测（含 msgCache 缓存基线）
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: 安装 web 依赖
        working-directory: web
        run: npm ci --legacy-peer-deps
      - name: Vitest（纯逻辑单测：reducer / msgCache 离线缓存语义基线）
        working-directory: web
        run: npm test

  backend-test:
    name: Backend Jest + 覆盖率门禁
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend-v2/package-lock.json
      - name: 安装 backend 依赖
        working-directory: backend-v2
        run: npm ci
      - name: Jest（全套 + 覆盖率下限）
        working-directory: backend-v2
        env:
          REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:coverage
      - name: 上传覆盖率报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend-v2/coverage/
          retention-days: 7
          if-no-files-found: ignore
