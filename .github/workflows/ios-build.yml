name: iOS Build

# 在云端 macOS runner 上用 XcodeGen 生成工程并编译（模拟器，无需签名），
# 用于在没有本地 Mac 的情况下验证 iOS 工程是否可编译。
on:
  push:
    # 仅分支 push 时按 paths 触发；不限定 branches 会导致 tag push 也触发本工作流，
    # 造成一个端前缀 tag 误触发本 iOS 编译校验（详见 VERSIONING.md 的端隔离原则）。
    branches: [main, master]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    # macos-15 自带 Xcode 16，可读取 XcodeGen 生成的新工程格式(objectVersion 77)
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Resolve Swift packages
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Vxin.xcodeproj \
            -scheme Vxin

      - name: Build (iOS Simulator, no signing)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -project Vxin.xcodeproj \
            -scheme Vxin \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/xcodebuild.log
          if-no-files-found: ignore
