name: Android Release APK (signed)

# 云端打「正式签名版」APK：用同一套密钥签名，可覆盖升级、可上架。
# 用法：本仓库 → Actions → 「Android Release APK (signed)」→ Run workflow。
# 跑完在运行页底部 Artifacts 下载 vxin-release-apk。
# 需要 4 个仓库 Secret：ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD /
#                       ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD（已配置）。
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 构建 Web 前端
        working-directory: web
        run: |
          npm ci
          npm run build
          echo "✅ Web 构建完成，dist/ 已更新"

      - name: 同步 Web 资产到 Android（cap sync）
        working-directory: web
        run: |
          npx @capacitor/cli sync android
          echo "✅ cap sync 完成，Android assets 已更新"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS_B64" ]; then echo "::error::缺少 ANDROID_KEYSTORE_BASE64 secret"; exit 1; fi
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/vxin-release.jks"

      - name: Build signed release APK
        working-directory: web/android
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/vxin-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload signed APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vxin-release-apk
          path: web/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: 部署 APK 到香港服务器
        if: success()
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          APK=$(find web/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "部署: $APK → /var/www/downloads/vxin-android-latest.apk"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p /var/www/downloads"
          scp -i ~/.ssh/deploy_key "$APK" "${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/downloads/vxin-android-latest.apk"
          echo "✅ APK 已发布到 https://dipsin.com/downloads/vxin-android-latest.apk"
