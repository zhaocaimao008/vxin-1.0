name: Android Build

# 在云端 Ubuntu runner 上编译 Android，产出可直接安装的 debug APK（免签名）。
# 用于在没有本地开发环境时验证 Android 工程可编译，并下载 APK 装手机测试。
# 跑完后到本次运行页面底部 "Artifacts" 下载 vxin-debug-apk。
on:
  push:
    # 仅分支 push 时按 paths 触发；不限定 branches 会导致 tag push 也触发本工作流，
    # 造成一个端前缀 tag 误触发本 debug 构建（详见 VERSIONING.md 的端隔离原则）。
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vxin-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
