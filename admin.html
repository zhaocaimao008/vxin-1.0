<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vxin 管理后台</title>
  <link rel="stylesheet" href="/admin-style.css">
</head>
<body>
  <!-- ==================== LOGIN SCREEN ==================== -->
  <div id="loginScreen" class="login-container">
    <div class="login-card">
      <h1>vxin 管理</h1>
      <p>请输入管理员账号登录系统</p>
      <div id="loginError" class="form-error"></div>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="loginPhone">账号（手机号）</label>
          <input type="text" id="loginPhone" placeholder="输入手机号" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" placeholder="输入密码" required autocomplete="current-password">
        </div>
        <button type="submit" id="loginBtn" class="form-submit">登 录</button>
      </form>
    </div>
  </div>

  <!-- ==================== ADMIN DASHBOARD ==================== -->
  <div id="adminApp" class="admin-layout" style="display:none;">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <h1><span>✦ vxin</span></h1>
        <div class="subtitle">管理后台</div>
      </div>
      <nav class="admin-nav">
        <div class="admin-nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">
          📊 <span>仪表盘</span>
        </div>
        <div class="admin-nav-item" data-page="users" onclick="switchPage('users')">
          👥 <span>用户管理</span>
        </div>
      </nav>
      <div class="admin-sidebar-footer">
        <span id="adminUsername"></span>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="admin-main">
      <!-- Header -->
      <div class="admin-header">
        <h2 id="pageTitle">仪表盘</h2>
        <div class="admin-user-info">
          <span id="headerUsername"></span>
          <button class="btn-logout" onclick="handleLogout()">退出登录</button>
        </div>
      </div>

      <!-- ===== DASHBOARD PAGE ===== -->
      <div id="page-dashboard">
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card stat-users">
            <div class="stat-label">用户总数</div>
            <div class="stat-value" id="statUsers">-</div>
            <div class="stat-sub">注册用户总量</div>
          </div>
          <div class="stat-card stat-convs">
            <div class="stat-label">会话总数</div>
            <div class="stat-value" id="statConversations">-</div>
            <div class="stat-sub">全部聊天会话</div>
          </div>
          <div class="stat-card stat-messages">
            <div class="stat-label">消息总数</div>
            <div class="stat-value" id="statMessages">-</div>
            <div class="stat-sub">全部已发消息</div>
          </div>
          <div class="stat-card stat-online">
            <div class="stat-label">最近活跃</div>
            <div class="stat-value" id="statActive">-</div>
            <div class="stat-sub">7日内有活动的用户</div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">📋 最近会话</div>
          <div class="table-container">
            <table id="recentConversationsTable">
              <thead>
                <tr>
                  <th>会话名称</th>
                  <th>类型</th>
                  <th>最后消息</th>
                  <th>消息数</th>
                  <th>创建时间</th>
                </tr>
              </thead>
              <tbody id="recentConversationsBody">
                <tr class="empty-row"><td colspan="5">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ===== USERS PAGE ===== -->
      <div id="page-users" style="display:none;">
        <div class="search-bar">
          <input type="text" id="userSearchInput" placeholder="搜索用户名、V信号、手机号..." onkeydown="if(event.key==='Enter') searchUsers()">
          <button class="btn-primary" onclick="searchUsers()">搜 索</button>
        </div>

        <div class="table-container">
          <div class="table-header">
            <h3 id="usersTableTitle">用户列表</h3>
            <span class="table-count" id="usersCount">共 0 人</span>
          </div>
          <table id="usersTable">
            <thead>
              <tr>
                <th>用户名</th>
                <th>手机号</th>
                <th>V信号</th>
                <th>状态</th>
                <th>注册时间</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr class="empty-row"><td colspan="5">请输入关键词搜索用户</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
  // ============================================================
  //  vxin Admin Panel - JavaScript
  // ============================================================

  const API_BASE = '/api';

  // ── Token management ────────────────────────────────────────
  function getToken() {
    return sessionStorage.getItem('vxin_admin_token');
  }

  function setToken(token) {
    sessionStorage.setItem('vxin_admin_token', token);
  }

  function clearToken() {
    sessionStorage.removeItem('vxin_admin_token');
  }

  function getStoredUser() {
    try {
      return JSON.parse(sessionStorage.getItem('vxin_admin_user') || '{}');
    } catch {
      return {};
    }
  }

  function setStoredUser(user) {
    sessionStorage.setItem('vxin_admin_user', JSON.stringify(user));
  }

  // ── HTTP helpers ────────────────────────────────────────────
  async function apiRequest(path, options = {}) {
    const url = API_BASE + path;
    const headers = { ...options.headers };
    const token = getToken();
    if (token) {
      headers['Authorization'] = 'Bearer ' + token;
    }
    if (options.body && typeof options.body === 'object' && !(options.body instanceof FormData)) {
      headers['Content-Type'] = 'application/json';
    }
    // CSRF 双提交：非安全方法回传 csrf_token cookie 到 X-CSRF-Token（适配 backend-v2）
    const _method = (options.method || 'GET').toUpperCase();
    if (_method !== 'GET' && _method !== 'HEAD' && _method !== 'OPTIONS') {
      const _m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
      if (_m) headers['X-CSRF-Token'] = decodeURIComponent(_m[1]);
    }
    const resp = await fetch(url, {
      ...options,
      credentials: 'include',
      headers,
      body: options.body
        ? (typeof options.body === 'object' && !(options.body instanceof FormData)
            ? JSON.stringify(options.body)
            : options.body)
        : undefined,
    });
    const text = await resp.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch {
      data = text;
    }
    if (!resp.ok) {
      const err = new Error(data && data.error ? data.error : '请求失败 (' + resp.status + ')');
      err.status = resp.status;
      err.data = data;
      throw err;
    }
    return data;
  }

  // ── Login ───────────────────────────────────────────────────
  async function handleLogin(event) {
    event.preventDefault();
    const phone = document.getElementById('loginPhone').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');

    errEl.classList.remove('visible');
    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
      const result = await apiRequest('/auth/login', {
        method: 'POST',
        body: { phone, password },
      });
      setToken(result.token);
      setStoredUser(result.user);
      showAdmin();
      loadDashboard();
    } catch (e) {
      errEl.textContent = e.message || '登录失败';
      errEl.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = '登 录';
    }
    return false;
  }

  function handleLogout() {
    clearToken();
    sessionStorage.removeItem('vxin_admin_user');
    document.getElementById('loginScreen').style.display = '';
    document.getElementById('adminApp').style.display = 'none';
    document.getElementById('loginPassword').value = '';
  }

  // ── Page switching ──────────────────────────────────────────
  function switchPage(page) {
    document.querySelectorAll('.admin-nav-item').forEach(el => el.classList.remove('active'));
    document.querySelector('.admin-nav-item[data-page="' + page + '"]').classList.add('active');

    document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none');
    document.getElementById('page-' + page).style.display = '';

    const titles = { dashboard: '仪表盘', users: '用户管理' };
    document.getElementById('pageTitle').textContent = titles[page] || page;

    if (page === 'users') {
      const input = document.getElementById('userSearchInput');
      if (input.value.trim()) searchUsers();
    }
    if (page === 'dashboard') {
      loadDashboard();
    }
  }

  // ── Show admin UI ───────────────────────────────────────────
  function showAdmin() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = '';
    const user = getStoredUser();
    const displayName = user.username || user.phone || '管理员';
    document.getElementById('adminUsername').textContent = '👤 ' + displayName;
    document.getElementById('headerUsername').textContent = '当前用户: ' + displayName;
  }

  // ── Dashboard ───────────────────────────────────────────────
  async function loadDashboard() {
    // Load stats
    try {
      // Fetch users with a broad search to get a count estimate
      const users = await apiRequest('/users/search?q=' + encodeURIComponent('a') + '&limit=20');
      document.getElementById('statUsers').textContent = users.length > 0 ? users.length + '+' : '0';
    } catch {
      document.getElementById('statUsers').textContent = 'N/A';
    }

    try {
      // Try to get better count via empty search (may be limited by backend)
      const allUsers = await apiRequest('/users/search?q=' + encodeURIComponent('1') + '&limit=20');
      const userCountEl = document.getElementById('statUsers');
      // Show max of both searches
      const count1 = parseInt(userCountEl.textContent) || 0;
      const count2 = allUsers.length || 0;
      userCountEl.textContent = Math.max(count1, count2) + '+';
    } catch {}

    try {
      const conversations = await apiRequest('/messages/conversations');
      document.getElementById('statConversations').textContent = Array.isArray(conversations) ? conversations.length : 0;

      // Count total messages from conversations
      let totalMessages = 0;
      if (Array.isArray(conversations)) {
        totalMessages = conversations.length;
        // Show recent conversations in table
        const tbody = document.getElementById('recentConversationsBody');
        if (conversations.length === 0) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="5">暂无会话数据</td></tr>';
        } else {
          tbody.innerHTML = conversations.slice(0, 20).map(conv => {
            const typeLabel = conv.type === 'group' ? '群聊' : '私聊';
            const lastMsg = conv.lastMessage || '-';
            const lastTime = conv.lastTime ? formatTime(conv.lastTime) : '-';
            const convName = conv.name || (conv.ou_username || '未知会话');
            const unread = conv.unreadCount || 0;
            return '<tr>' +
              '<td class="truncate" title="' + escHtml(convName) + '">' + escHtml(convName) + '</td>' +
              '<td><span class="badge ' + (conv.type === 'group' ? 'badge-warning' : 'badge-success') + '">' + typeLabel + '</span></td>' +
              '<td class="truncate" title="' + escHtml(lastMsg) + '">' + escHtml(lastMsg) + '</td>' +
              '<td>' + unread + '</td>' +
              '<td class="text-sm text-muted">' + lastTime + '</td>' +
              '</tr>';
          }).join('');
        }
      }
      document.getElementById('statMessages').textContent = totalMessages;
    } catch {
      document.getElementById('statConversations').textContent = 'N/A';
      document.getElementById('statMessages').textContent = 'N/A';
      document.getElementById('recentConversationsBody').innerHTML =
        '<tr class="empty-row"><td colspan="5">加载失败</td></tr>';
    }

    // Active users estimate
    document.getElementById('statActive').textContent =
      document.getElementById('statUsers').textContent;
  }

  // ── User Search ─────────────────────────────────────────────
  async function searchUsers() {
    const q = document.getElementById('userSearchInput').value.trim();
    const tbody = document.getElementById('usersBody');
    const countEl = document.getElementById('usersCount');

    if (!q) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">请输入关键词搜索用户</td></tr>';
      countEl.textContent = '共 0 人';
      return;
    }

    tbody.innerHTML = '<tr class="empty-row"><td colspan="5"><div class="spinner"></div></td></tr>';

    try {
      const users = await apiRequest('/users/search?q=' + encodeURIComponent(q) + '&limit=20');

      if (!users || users.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">未找到匹配的用户</td></tr>';
        countEl.textContent = '共 0 人';
        return;
      }

      countEl.textContent = '共 ' + users.length + ' 人';

      tbody.innerHTML = users.map(u => {
        const createdAt = u.created_at ? formatTime(u.created_at) : '-';
        const statusLabel = u.status === 'online' ? '在线' : (u.status === 'offline' ? '离线' : (u.status || '-'));
        const statusClass = u.status === 'online' ? 'badge-success' : 'badge-danger';
        return '<tr>' +
          '<td><strong>' + escHtml(u.username || '-') + '</strong></td>' +
          '<td class="text-sm text-muted">' + escHtml(u.phone || '-') + '</td>' +
          '<td class="text-sm">' + escHtml(u.wechat_id || '-') + '</td>' +
          '<td><span class="badge ' + statusClass + '">' + statusLabel + '</span></td>' +
          '<td class="text-sm text-muted">' + createdAt + '</td>' +
          '</tr>';
      }).join('');
    } catch (e) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">搜索失败: ' + escHtml(e.message) + '</td></tr>';
      countEl.textContent = '共 0 人';
    }
  }

  // ── Utilities ───────────────────────────────────────────────
  function formatTime(ts) {
    if (!ts) return '-';
    // If it's a Unix timestamp (seconds)
    const d = typeof ts === 'number' || /^\d{10}$/.test(String(ts))
      ? new Date(Number(ts) * 1000)
      : new Date(ts);
    if (isNaN(d.getTime())) return String(ts);
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const dateStr = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    const timeStr = pad(d.getHours()) + ':' + pad(d.getMinutes());
    if (dateStr === now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate())) {
      return '今天 ' + timeStr;
    }
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.getFullYear() + '-' + pad(yesterday.getMonth() + 1) + '-' + pad(yesterday.getDate());
    if (dateStr === yStr) {
      return '昨天 ' + timeStr;
    }
    return dateStr + ' ' + timeStr;
  }

  function escHtml(str) {
    if (str == null) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
  }

  // ── Init ────────────────────────────────────────────────────
  (function init() {
    const token = getToken();
    const user = getStoredUser();
    if (token && user && user.id) {
      showAdmin();
      loadDashboard();
    }
  })();
  </script>
</body>
</html>
