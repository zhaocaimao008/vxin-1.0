<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';
             img-src 'self' data: https:; connect-src https: wss:; media-src https: blob:;" />
  <title>v信</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

<!-- Windows frameless titlebar -->
<div id="win-titlebar">
  <span id="win-titlebar-title">v信</span>
  <div class="win-title-btns">
    <button class="win-btn" id="win-min" title="最小化">&#x2014;</button>
    <button class="win-btn" id="win-max" title="最大化">&#x25A1;</button>
    <button class="win-btn close" id="win-close" title="关闭">&#x2715;</button>
  </div>
</div>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>v信</h1>
    <p class="subtitle">安全 · 快速 · 私密</p>

    <div class="login-tabs">
      <div class="login-tab active" data-tab="login">登录</div>
      <div class="login-tab" data-tab="register">注册</div>
    </div>

    <div id="tab-login">
      <div class="field"><label>账号</label><input id="login-username" type="text" placeholder="用户名 / 手机号" autocomplete="username" /></div>
      <div class="field"><label>密码</label><input id="login-password" type="password" placeholder="密码" autocomplete="current-password" /></div>
      <button class="btn-primary" id="btn-login">登录</button>
    </div>

    <div id="tab-register" class="hidden">
      <div class="field"><label>用户名</label><input id="reg-username" type="text" placeholder="3-20 个字符" /></div>
      <div class="field"><label>昵称</label><input id="reg-nickname" type="text" placeholder="显示名称" /></div>
      <div class="field"><label>密码</label><input id="reg-password" type="password" placeholder="至少 6 位" /></div>
      <button class="btn-primary" id="btn-register">注册</button>
    </div>

    <p class="login-err" id="login-err"></p>
  </div>
</div>

<!-- Main app -->
<div id="app" class="hidden">

  <!-- Nav sidebar -->
  <nav id="nav-bar">
    <img id="nav-avatar" class="nav-avatar" src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="me" />

    <div class="nav-btn active" data-view="chats" title="消息">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="nav-badge hidden" id="total-badge"></span>
    </div>

    <div class="nav-btn" data-view="contacts" title="通讯录">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>

    <div class="nav-btn" data-view="moments" title="朋友圈">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </div>

    <div class="nav-spacer"></div>

    <div class="nav-btn" data-view="settings" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>

  </nav>

  <!-- List panel -->
  <div id="panel">
    <!-- Chats panel -->
    <div id="chats-panel">
      <div class="panel-header">
        <div class="panel-title">消息</div>
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="conv-search" placeholder="搜索" />
        </div>
      </div>
      <div class="panel-list" id="conv-list"></div>
    </div>

    <!-- Contacts panel -->
    <div id="contacts-panel" class="hidden">
      <div class="panel-header">
        <div class="panel-title">通讯录</div>
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="contact-search" placeholder="搜索好友" />
        </div>
      </div>
      <div class="panel-list" id="contact-list"></div>
    </div>

    <!-- Moments / Settings use full content area, no side list -->
    <div id="moments-panel" class="hidden">
      <div class="panel-header"><div class="panel-title">朋友圈</div></div>
    </div>
    <div id="settings-panel" class="hidden">
      <div class="panel-header"><div class="panel-title">设置</div></div>
    </div>
  </div>

  <!-- Content area -->
  <div id="content">
    <!-- Placeholder when no chat open -->
    <div id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>选择一个对话开始聊天</p>
    </div>

    <!-- Chat view -->
    <div id="chat-view" class="hidden">
      <div class="chat-header">
        <div>
          <div class="chat-header-name" id="chat-title">对话名</div>
          <div class="chat-header-sub" id="chat-sub"></div>
        </div>
        <div class="chat-header-actions">
          <div class="header-btn" id="btn-search-in-chat" title="搜索">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </div>
          <div class="header-btn" id="btn-chat-info" title="聊天信息">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Pinned message -->
      <div id="pinned-banner" class="hidden">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m15 4-8 8 2 2 8-8zM9 15l-4 4"/>
          <path d="M14 3l7 7"/>
        </svg>
        <span id="pinned-text">置顶消息</span>
      </div>

      <div id="messages-area"></div>

      <!-- Input -->
      <div id="input-area">
        <div class="input-toolbar">
          <button class="tool-btn" id="btn-emoji" title="表情">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
            </svg>
          </button>
          <button class="tool-btn" id="btn-image" title="图片">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21,15 16,10 5,21"/>
            </svg>
          </button>
          <button class="tool-btn" id="btn-file" title="文件">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <button class="tool-btn" id="btn-sticker" title="贴纸">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c.28 0 .57-.01.85-.04l7.15-7.15c.03-.28.04-.57.04-.85C20 6.48 15.52 2 12 2z"/>
              <path d="M12 12v.01M8 10v.01M16 10v.01"/>
            </svg>
          </button>
        </div>

        <!-- Emoji panel -->
        <div id="emoji-panel" class="hidden">
          <div class="emoji-grid" id="emoji-grid"></div>
        </div>

        <!-- Reply preview -->
        <div class="reply-preview hidden" id="reply-preview">
          <span class="rp-text" id="reply-text"></span>
          <span class="rp-close" id="reply-cancel">×</span>
        </div>

        <!-- Upload progress -->
        <div class="upload-bar hidden" id="upload-bar">
          <div class="upload-progress" id="upload-progress" style="width:0%"></div>
        </div>

        <!-- Mention list -->
        <div id="mention-list" class="hidden"></div>

        <div class="input-row" style="position:relative">
          <textarea id="msg-input" rows="1" placeholder="发消息…" maxlength="4000"></textarea>
          <button class="send-btn" id="btn-send" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Contacts view (full content) -->
    <div id="contacts-view" class="hidden"></div>

    <!-- Moments view -->
    <div id="moments-view" class="hidden"></div>

    <!-- Settings view -->
    <div id="settings-view" class="hidden"></div>
  </div>
</div>

<!-- Context menu -->
<div id="ctx-menu" class="hidden"></div>

<!-- Image lightbox -->
<div id="lightbox" class="hidden">
  <div id="lightbox-close">✕</div>
  <img id="lightbox-img" src="" alt="" />
</div>

<!-- Hidden file inputs -->
<input type="file" id="file-image-input" accept="image/*" style="display:none" />
<input type="file" id="file-any-input" style="display:none" />

<script src="../node_modules/axios/dist/axios.min.js"></script>
<script src="../node_modules/socket.io-client/dist/socket.io.min.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
