<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  v信 PC 端 - Q&A 帮助页面                                      ║
  ║  风格：微信 PC 4.1.10 深色侧边栏 + 白色内容区                   ║
  ║  技术栈：纯 HTML + Tailwind CSS CDN + Vanilla JS                ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>v信 · 帮助与反馈</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      'wx-green':  '#07C160',
      'wx-bg':     '#EDEDED',
      'wx-dark':   '#1E1E1E',
      'wx-active': '#C7ECD3',
      'wx-blue':   '#5569FF',
      'wx-title':  '#223354',
      'wx-body':   '#5C6B8A',
      'wx-div':    '#E8EDF2',
      'wx-card':   '#F7F9FC',
    },
  }}
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei UI","Microsoft YaHei","Segoe UI",sans-serif;
  background:#EDEDED;
  -webkit-font-smoothing:antialiased;
  font-size:14px;
  color:#191919;
  user-select:none;
}
button{cursor:pointer;border:none;background:none;outline:none;font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.14);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25)}
.nav-btn{
  width:68px;height:50px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  transition:background .08s;
}
.nav-btn:hover{background:rgba(255,255,255,.07)}
.nav-btn.active{background:rgba(255,255,255,.10)}
.nav-btn.active::after{
  content:'';position:absolute;
  left:0;top:50%;transform:translateY(-50%);
  width:3px;height:20px;
  background:#07C160;border-radius:0 2px 2px 0;
}
.nav-btn svg{width:22px;height:22px;fill:rgba(255,255,255,.38);transition:fill .08s}
.nav-btn:hover svg{fill:rgba(255,255,255,.62)}
.nav-btn.active svg{fill:rgba(255,255,255,.92)}

/* ── Accordion ─────────────────────────── */
.accordion-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;cursor:pointer;
  border-bottom:1px solid #E8EDF2;
  transition:background .1s;
}
.accordion-header:hover{background:rgba(85,105,255,.04)}
.accordion-header.open{border-bottom-color:transparent}
.accordion-body{
  max-height:0;overflow:hidden;
  transition:max-height .25s ease, padding .25s ease;
  padding:0 16px;
  background:#fff;
  border-bottom:1px solid #E8EDF2;
}
.accordion-body.open{
  max-height:400px;
  padding:0 16px 20px;
}

/* ── Category header ───────────────────── */
.cat-header{
  display:flex;align-items:center;gap:10px;
  padding:16px 16px 12px;
  border-bottom:none;
  cursor:default;
}
.cat-header .icon{font-size:18px;line-height:1}
.cat-header .title{font-size:15px;font-weight:600;color:#223354}

/* ── Sidebar item ──────────────────────── */
.sidebar-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;cursor:pointer;transition:background .07s;
  border-radius:6px;
}
.sidebar-item:hover{background:rgba(85,105,255,.06)}
.sidebar-item .num{
  width:22px;height:22px;border-radius:4px;
  background:#5569FF;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;flex-shrink:0;
}
</style>
</head>
<body>

<!-- ══════════ 主布局 ══════════ -->
<div id="app" style="display:flex;height:100%">

  <!-- ── 左侧导航栏 68px ── -->
  <aside style="width:68px;min-width:68px;background:#1E1E1E;display:flex;flex-direction:column;align-items:center;z-index:10;flex-shrink:0">
    <div style="margin:16px 0 10px;cursor:pointer" title="个人信息">
      <div style="width:36px;height:36px;border-radius:6px;background:linear-gradient(135deg,#07C160,#0ABF50);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff">我</div>
    </div>
    <nav style="flex:1;width:100%;display:flex;flex-direction:column">
      <button class="nav-btn" title="聊天" onclick="location.href='/'"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg></button>
      <button class="nav-btn" title="通讯录" onclick="location.href='/'"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></button>
      <button class="nav-btn" title="发现" onclick="location.href='/'"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-.71-5.05l4.58-2.27L13.6 8.1l-4.58 2.27 2.27 4.58zm.71-3.36a1.4 1.4 0 110 2.8 1.4 1.4 0 010-2.8z"/></svg></button>
      <button class="nav-btn" title="我" onclick="location.href='/'"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></button>
    </nav>
    <div style="padding-bottom:10px">
      <button class="nav-btn active" style="height:44px" title="帮助与反馈">
        <svg style="width:20px;height:20px;" viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/></svg>
      </button>
    </div>
  </aside>

  <!-- ── 左侧面板 280px ── -->
  <section style="width:280px;min-width:280px;background:#EDEDED;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(0,0,0,.08)">
    <!-- 顶栏 -->
    <div style="height:52px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(0,0,0,.08);flex-shrink:0;background:#EDEDED">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:16px">📖</span>
        <span style="font-size:15px;font-weight:600;color:#191919">帮助与反馈</span>
      </div>
    </div>
    <!-- 目录 -->
    <div style="flex:1;overflow-y:auto;padding:12px 12px">
      <div id="toc"></div>
    </div>
  </section>

  <!-- ── 主内容区 ── -->
  <main style="flex:1;display:flex;flex-direction:column;min-width:0;background:#fff;overflow:hidden">

    <!-- 标题栏 -->
    <div style="height:52px;flex-shrink:0;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #E8EDF2;background:#fff">
      <div>
        <div style="font-size:18px;font-weight:700;color:#223354">Q&A</div>
        <div style="font-size:12px;color:#5C6B8A;margin-top:2px">已为您整理常见问题</div>
      </div>
    </div>

    <!-- 内容区（可滚动） -->
    <div style="flex:1;overflow-y:auto;padding:24px">
      <div style="max-width:800px">

        <!-- 说明 -->
        <div style="padding:14px 18px;background:#F7F9FC;border-radius:8px;margin-bottom:28px;border:1px solid #E8EDF2">
          <div style="font-size:13px;color:#5C6B8A;line-height:1.7">
            我们整理了用户最常遇到的问题。如仍无法解决，请在 <strong style="color:#5569FF;font-weight:600">v信 &gt; 设置 &gt; 帮助与反馈</strong> 中提交问题，我们将尽快回复。
          </div>
        </div>

        <!-- FAQ 内容 -->
        <div id="faq-content"></div>

      </div>
    </div>

  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const FAQ = [
  {
    id: 1,
    title: '1 注册与登录问题',
    icon: '📌',
    items: [
      {
        q: '1.1 如何注册 v信？',
        a: '下载 v信 应用后打开，点击"注册"，输入手机号并接收短信验证码完成验证。设置密码即可完成注册。桌面端需要通过手机端扫码登录。'
      },
      {
        q: '1.2 登录失败怎么办？',
        a: '请检查：①手机号和密码输入是否正确；②网络连接是否正常；③如忘记密码，可在登录页点击"忘记密码"通过短信验证重置；④如账号被锁，请联系客服 support@vxin.app。'
      },
      {
        q: '1.3 如何退出登录？',
        a: '点击左下角菜单 > 设置 > 退出登录。退出后数据不会丢失，下次登录即可恢复。'
      },
    ]
  },
  {
    id: 2,
    title: '2 企业部署',
    icon: '📌',
    items: [
      {
        q: '2.1 如何在企业服务器部署 v信？',
        a: '企业部署需要购买企业版许可证。购买后您将收到部署包和详细文档。支持系统：Linux (Ubuntu 20.04+, CentOS 7+) 和 Windows Server 2016+。推荐配置：4核 CPU、8GB RAM。'
      },
      {
        q: '2.2 企业版有哪些功能？',
        a: '企业版包括：私有服务器部署、管理后台、集中用户管理、审计日志、SSO 集成 (SAML 2.0 / LDAP)、自定义品牌、24/7 技术支持、REST API、批量账号导入。'
      },
    ]
  },
  {
    id: 3,
    title: '3 联系人问题',
    icon: '📌',
    items: [
      {
        q: '3.1 如何添加联系人？',
        a: '进入通讯录页面，点击"+"图标，可通过手机号或 v信ID 搜索添加。如搜索不到，对方可能设置了隐私权限限制。也可通过扫描对方二维码一键添加。'
      },
      {
        q: '3.2 群聊消息不送达或成员无法加入',
        a: '请检查：①所有成员网络连接正常；②群主可在群设置中管理群成员权限；③消息显示"已发送"但未"已读"，表示对方可能离线；④普通群最多500人，企业群最多2000人。'
      },
    ]
  },
  {
    id: 4,
    title: '4 安装问题',
    icon: '📌',
    items: [
      {
        q: '4.1 Windows 安装失败',
        a: '请确保：①Windows 7 SP1 或更高版本；②右键安装程序选择"以管理员身份运行"；③临时关闭杀毒软件；④从官方网站 vxin.app 下载；⑤至少 500MB 可用磁盘空间。'
      },
      {
        q: '4.2 安装后应用无法打开',
        a: '请尝试：①重启电脑；②打开 Windows 事件查看器查看崩溃日志；③以管理员身份重新安装；④如提示缺少 .NET Framework，请安装 4.7.2 或更高版本。如问题持续，请将日志发送至 support@vxin.app。'
      },
    ]
  },
];

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════

/* ── 左侧目录 ── */
function renderTOC() {
  const container = document.getElementById('toc');
  container.innerHTML = '<div style="font-size:12px;font-weight:700;color:#223354;margin-bottom:12px;letter-spacing:.3px">FAQ</div>';

  FAQ.forEach(cat => {
    const item = document.createElement('div');
    item.style.cssText = 'margin-bottom:14px';
    item.innerHTML = `
      <div style="font-size:13px;color:#5C6B8A;cursor:pointer;line-height:1.5;transition:color .15s"
           onmouseenter="this.style.color='#5569FF'" onmouseleave="this.style.color='#5C6B8A'"
           onclick="scrollToCat(${cat.id})">
        ${cat.title}
      </div>
      <div style="padding-left:8px;margin-top:4px;display:flex;flex-wrap:wrap;align-items:center;gap:0">
        ${cat.items.map((item, i) => `
          <span style="font-size:11px;color:#5C6B8A;cursor:pointer;transition:color .15s"
                onmouseenter="this.style.color='#5569FF'" onmouseleave="this.style.color='#5C6B8A'"
                onclick="scrollToCat(${cat.id})">
            ${i > 0 ? ' <span style="color:#E8EDF2;margin:0 4px">·</span> ' : ''}
            ${item.q.split(' ').slice(0,3).join(' ')}
          </span>
        `).join('')}
      </div>
    `;
    container.appendChild(item);
  });
}

/* ── 主内容区 FAQ ── */
function renderFAQ() {
  const container = document.getElementById('faq-content');

  FAQ.forEach(cat => {
    const section = document.createElement('div');
    section.id = `cat-${cat.id}`;

    // 分类标题
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <span class="icon">${cat.icon}</span>
      <span class="title">${cat.title}</span>
    `;
    section.appendChild(header);

    // 子问题手风琴
    cat.items.forEach((item, i) => {
      const key = `${cat.id}-${i}`;
      const wrapper = document.createElement('div');

      // 面板头
      const accHeader = document.createElement('div');
      accHeader.className = 'accordion-header';
      accHeader.setAttribute('data-key', key);
      accHeader.onclick = () => toggleAccordion(key);
      accHeader.innerHTML = `
        <span style="font-size:14px;font-weight:500;color:#223354;line-height:1.5;flex:1">${item.q}</span>
        <span class="arrow" data-key="${key}" style="color:#5569FF;font-size:18px;transition:transform .2s;flex-shrink:0">▶</span>
      `;
      wrapper.appendChild(accHeader);

      // 面板内容
      const accBody = document.createElement('div');
      accBody.className = 'accordion-body open';
      accBody.setAttribute('data-key', key);
      accBody.innerHTML = `
        <div style="font-size:14px;color:#5C6B8A;line-height:1.7">${item.a}</div>
      `;
      wrapper.appendChild(accBody);

      section.appendChild(wrapper);
    });

    container.appendChild(section);
  });

  // 默认全部展开
  document.querySelectorAll('.accordion-body').forEach(el => {
    el.style.maxHeight = el.scrollHeight + 'px';
  });
}

/* ── 手风琴切换 ── */
function toggleAccordion(key) {
  const body = document.querySelector(`.accordion-body[data-key="${key}"]`);
  const header = document.querySelector(`.accordion-header[data-key="${key}"]`);
  const arrow = document.querySelector(`.arrow[data-key="${key}"]`);
  const isOpen = body.classList.contains('open');

  if (isOpen) {
    body.classList.remove('open');
    body.style.maxHeight = '0';
    header.classList.remove('open');
    arrow.style.transform = 'rotate(0deg)';
  } else {
    body.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 'px';
    header.classList.add('open');
    arrow.style.transform = 'rotate(90deg)';
  }
}

/* ── 滚动到分类 ── */
function scrollToCat(id) {
  const el = document.getElementById(`cat-${id}`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
renderTOC();
renderFAQ();
</script>
</body>
</html>
