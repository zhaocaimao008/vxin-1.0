name: Vxin
options:
  bundleIdPrefix: com.vxin
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "7.10.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.4.0"
  WebRTC:
    url: https://github.com/stasel/WebRTC
    from: "125.0.0"

targets:
  Vxin:
    type: application
    platform: iOS
    sources:
      - Vxin
    dependencies:
      - package: SocketIO
      - package: Kingfisher
      - package: Firebase
        product: FirebaseMessaging
      - package: WebRTC
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vxin.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.10"
        CURRENT_PROJECT_VERSION: "11"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        # 发布签名只挂在 App 主 target，避免命令行全局传参把描述文件
        # 套用到 SPM 依赖(Firebase/Kingfisher 等)而报 "does not support
        # provisioning profiles"。CI 归档不再传 PROVISIONING_PROFILE_SPECIFIER。
        # 模拟器构建走 CODE_SIGNING_ALLOWED=NO，不受影响。
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: F2J52VX786
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        PROVISIONING_PROFILE_SPECIFIER: vxin_distribution
    info:
      path: Vxin/Info.plist
      properties:
        CFBundleDisplayName: v信
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # 后台收推送（远程通知）
        UIBackgroundModes:
          - remote-notification
        # 录音 / 相册 用途说明（聊天媒体阶段需要）
        NSMicrophoneUsageDescription: 用于录制语音消息与音视频通话
        NSPhotoLibraryUsageDescription: 用于发送图片
        NSCameraUsageDescription: 用于扫码添加好友与视频通话
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false

  VxinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VxinTests
    dependencies:
      - target: Vxin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vxin.app.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true

# 显式声明 Vxin scheme 的 test 动作挂上 VxinTests，
# 保证 CI 里 `xcodebuild test -scheme Vxin -only-testing:VxinTests` 可用。
schemes:
  Vxin:
    build:
      targets:
        Vxin: all
        VxinTests: [test]
    test:
      targets:
        - VxinTests
      gatherCoverageData: false
