input {
  # 读取 Winston 日志文件
  file {
    path => "/logs/combined.log"
    start_position => "beginning"
    codec => json
    tags => ["app-logs"]
  }

  file {
    path => "/logs/error.log"
    start_position => "beginning"
    codec => json
    tags => ["error-logs"]
  }

  # 接收来自应用的 Syslog
  syslog {
    port => 5000
    tags => ["syslog"]
  }

  # HTTP 端点（可选）
  http {
    port => 8080
    tags => ["http-logs"]
  }
}

filter {
  # 解析 JSON 日志
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }

  # 添加时间戳
  if ![timestamp] {
    ruby {
      code => 'event.set("timestamp", Time.now)'
    }
  }

  # 提取关键字段
  if [level] {
    mutate {
      add_field => {
        "log_level" => "%{level}"
      }
    }
  }

  # 解析响应时间
  if [duration] {
    mutate {
      convert => {
        "duration" => "float"
      }
    }

    # 添加性能标签
    if [duration] > 2000 {
      mutate {
        add_tag => ["slow-request"]
      }
    }
  }

  # 解析错误日志
  if "error" in [tags] or [level] == "error" {
    mutate {
      add_tag => ["error-alert"]
    }
  }

  # 地理位置信息（如果有 IP）
  if [clientIp] {
    geoip {
      source => "clientIp"
      target => "geoip"
    }
  }

  # 删除不需要的字段
  mutate {
    remove_field => ["host", "path"]
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "vxin-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # 控制台输出（调试）
  if [level] == "error" or "error-alert" in [tags] {
    stdout {
      codec => rubydebug
    }
  }

  # 也发送到文件作为备份
  file {
    path => "/logs/logstash-output.log"
    codec => json
  }
}
