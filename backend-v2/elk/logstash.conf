input {
  file {
    path => "/logs/combined.log"
    start_position => "beginning"
    codec => json
    tags => ["v信-backend", "combined-log"]
  }

  file {
    path => "/logs/error.log"
    start_position => "beginning"
    codec => json
    tags => ["v信-backend", "error-log"]
  }
}

filter {
  # 解析JSON日志
  if [message] {
    json {
      source => "message"
      target => "log_data"
    }
  }

  # 提取日志级别
  if [level] {
    mutate {
      add_field => { "log_level" => "%{level}" }
    }
  }

  # 添加时间戳
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # 性能指标分析
  if [duration] {
    mutate {
      convert => { "duration" => "integer" }
    }

    if [duration] > 1000 {
      mutate {
        add_tag => ["slow_request"]
      }
    }
  }

  # 错误标记
  if [error] or [errorMessage] {
    mutate {
      add_tag => ["error"]
    }
  }

  # 用户标识
  if [userId] {
    mutate {
      add_field => { "user_id" => "%{userId}" }
    }
  }

  # 操作类型分类
  if [operation] {
    mutate {
      add_field => { "operation_type" => "%{operation}" }
    }
  }
}

output {
  # 所有日志到Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "v信-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # 错误日志单独存储
  if "error" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "v信-errors-%{+YYYY.MM.dd}"
      document_type => "_doc"
    }
  }

  # 慢请求单独存储
  if "slow_request" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "v信-slow-requests-%{+YYYY.MM.dd}"
      document_type => "_doc"
    }
  }

  # 控制台输出（调试）
  # stdout { codec => rubydebug }
}
