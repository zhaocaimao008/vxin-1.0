global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'vxin-monitor'

scrape_configs:
  - job_name: 'vxin-backend'
    static_configs:
      - targets: ['host.docker.internal:3002']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - '/etc/prometheus/rules/*.yml'
