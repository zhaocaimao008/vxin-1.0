# ─────────────────────────────────────────────────────────────────────────────
# v信 灰度发布 nginx 配置
#
# 使用方法:
#   1. 先在服务器启动新版后端（不同端口）:
#      PORT=3003 pm2 start backend-v2/src/server.js --name vxin-canary
#
#   2. 替换 upstream 权重（三步灰度: 10% → 50% → 100%）:
#      第一步 (观察 15min): stable=weight=9  canary=weight=1
#      第二步 (观察 15min): stable=weight=5  canary=weight=5
#      第三步 (完全切换):   stable=weight=0  canary=weight=1
#
#   3. 完全切换后，停稳定版: pm2 delete vxin-canary (把 3003 变新的稳定版)
#
#   用于生产时复制覆盖 /etc/nginx/sites-enabled/vxin-dipsin.conf
#   然后: nginx -t && nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

upstream vxin_backend {
    # ── 灰度权重（根据阶段修改这两行，无需重启 nginx，reload 即可）──
    server 127.0.0.1:3002 weight=9;   # 稳定版
    server 127.0.0.1:3003 weight=1;   # 金丝雀版
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dipsin.com www.dipsin.com;

    ssl_certificate     /etc/letsencrypt/live/chat.91aigu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.91aigu.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 520m;  # 后端单文件上限 500MB，留 20m 余量
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    location /api/ {
        proxy_pass http://vxin_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass http://vxin_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /uploads/ {
        proxy_pass http://vxin_backend/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
    }

    location /health {
        proxy_pass http://vxin_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location /download {
        proxy_pass http://vxin_backend/download;
        proxy_set_header Host $host;
    }

    location /downloads/ {
        root /var/www;
        add_header Cache-Control "no-cache";
    }

    root /root/v信/landing/out;
    index index.html;

    location = /index.html {
        add_header Cache-Control no-store;
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|ico|svg|woff|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control public;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name dipsin.com www.dipsin.com;
    return 301 https://$host$request_uri;
}
